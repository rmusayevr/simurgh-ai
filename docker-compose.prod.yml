# ── Production compose ────────────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# Requires a .env file in the project root — copy .env.example and fill in.

x-backend-environment: &backend-environment
  DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "${SECRET_KEY}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  FRONTEND_URL: "${FRONTEND_URL}"
  BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS}"
  RESEND_API_KEY: "${RESEND_API_KEY:-}"
  SMTP_SERVER: "${SMTP_SERVER:-}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_USER: "${SMTP_USER:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  EMAIL_FROM_EMAIL: "${EMAIL_FROM_EMAIL:-noreply@simurghai.com}"
  EMAIL_FROM_NAME: "${EMAIL_FROM_NAME:-SimurghAI}"
  SKIP_EMAIL_VERIFICATION: "${SKIP_EMAIL_VERIFICATION:-false}"
  THESIS_MODE: "${THESIS_MODE:-false}"
  GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
  GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
  GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
  GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
  ATLASSIAN_CLIENT_ID: "${ATLASSIAN_CLIENT_ID:-}"
  ATLASSIAN_CLIENT_SECRET: "${ATLASSIAN_CLIENT_SECRET:-}"
  ENVIRONMENT: "production"
  DEBUG: "false"
  POETRY_VIRTUALENVS_CREATE: "false"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network
    logging: *default-logging

  backend:
    build:
      context: ./backend
      target: runtime
    restart: always
    # No --reload in production; gunicorn-style workers via uvicorn
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
    environment: *backend-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    logging: *default-logging

  celery_worker:
    build:
      context: ./backend
      target: runtime
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2} -Q vectorization,proposals,default
    environment: *backend-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    logging: *default-logging

  # One-shot container: builds React assets into the shared volume, then exits.
  frontend_build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_static:/usr/share/nginx/html
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_static:/usr/share/nginx/html:ro
      # SSL certificates from certbot (mount read-only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend_build:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - app-network
    logging: *default-logging

  db_backup:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      PGHOST: db
      BACKUP_RETAIN_DAYS: "${BACKUP_RETAIN_DAYS:-7}"
    volumes:
      - db_backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # pgvector:pg16 is Debian-based — install cron (not crond/BusyBox)
        apt-get update -qq && apt-get install -y -qq cron

        # Cron runs in a stripped environment and does not inherit Docker env vars.
        # Dump the variables the backup script needs into a file that cron sources.
        printenv | grep -E '^(POSTGRES_|PGHOST|BACKUP_RETAIN_DAYS)' > /etc/cron_env

        # Install the crontab — run backup daily at 02:00
        echo "0 2 * * * . /etc/cron_env; /bin/sh /backup.sh >> /var/log/backup.log 2>&1" | crontab -

        # Debian cron foreground flag is -f (BusyBox crond uses -f -l 2)
        cron -f
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    logging: *default-logging

volumes:
  postgres_data_prod:
  frontend_static:
  db_backups:

networks:
  app-network:
    driver: bridge
