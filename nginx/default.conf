# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name simurghai.com www.simurghai.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/46.225.136.129.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/46.225.136.129.nip.io/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
                text/xml application/xml text/javascript application/wasm;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                  always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Frontend (React SPA) ─────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # All routes fall back to index.html for client-side routing
        try_files $uri $uri/ /index.html;

        # Long-cache hashed assets (JS/CSS bundles have content-hash in filename)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp|wasm)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location /api/v1/ {
        proxy_pass         http://backend:8000/api/v1/;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI generation (debate can take 2–3 min)
        proxy_read_timeout    600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;

        # Allow document uploads
        client_max_body_size 20M;
    }
}