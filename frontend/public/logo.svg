<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0e7490"/>
            <stop offset="100%" stop-color="#0891b2"/>
        </linearGradient>
        <linearGradient id="wT" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="50%" stop-color="#eab308"/>
            <stop offset="100%" stop-color="#84cc16"/>
        </linearGradient>
        <linearGradient id="wB" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="64" height="64" rx="14" fill="url(#bg)"/>
    <rect width="64" height="64" rx="14" fill="white" fill-opacity="0.06"/>
    <!-- Left wing -->
    <path d="M29 30 C22 24,14 20,7 21 C11 23,17 26,22 30" fill="url(#wT)" opacity="0.95"/>
    <path d="M28 33 C20 31,12 31,7 36 C11 35,18 33,23 36" fill="url(#wB)" opacity="0.85"/>
    <!-- Right wing -->
    <path d="M35 30 C42 24,50 20,57 21 C53 23,47 26,42 30" fill="url(#wT)" opacity="0.95"/>
    <path d="M36 33 C44 31,52 31,57 36 C53 35,46 33,41 36" fill="url(#wB)" opacity="0.85"/>
    <!-- Tail — 3 feathers -->
    <line x1="29" y1="44" x2="21" y2="57" stroke="#0e7490" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="32" y1="45" x2="32" y2="58" stroke="#0891b2" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="35" y1="44" x2="43" y2="57" stroke="#0e7490" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Tail eye motif -->
    <circle cx="32" cy="58" r="3" fill="#064e3b"/>
    <circle cx="32" cy="58" r="1.8" fill="#22d3ee"/>
    <circle cx="32" cy="58" r="0.8" fill="#083344"/>
    <circle cx="31.4" cy="57.4" r="0.4" fill="white"/>
    <!-- Body -->
    <ellipse cx="32" cy="37" rx="5" ry="7" fill="white" fill-opacity="0.92"/>
    <!-- Head -->
    <circle cx="32" cy="24" r="6" fill="white" fill-opacity="0.92"/>
    <!-- Crown feathers -->
    <path d="M30 19 C29 15,28 12,29 9" stroke="#f97316" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M32 18 C32 14,32 11,33 8" stroke="#06b6d4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M34 19 C36 15,38 12,39 10" stroke="#a855f7" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <circle cx="29" cy="9" r="1.4" fill="#f97316"/>
    <circle cx="33" cy="8" r="1.4" fill="#06b6d4"/>
    <circle cx="39" cy="10" r="1.4" fill="#a855f7"/>
    <!-- Beak -->
    <path d="M34 23 L39 20 L34 26 Z" fill="#f97316"/>
    <!-- Eye -->
    <circle cx="34" cy="23" r="2.2" fill="#0ea5e9"/>
    <circle cx="34" cy="23" r="1" fill="#083344"/>
    <circle cx="33.4" cy="22.4" r="0.4" fill="white"/>
</svg>