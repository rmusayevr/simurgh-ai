<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0e7490"/>
            <stop offset="100%" stop-color="#0891b2"/>
        </linearGradient>
        <linearGradient id="wT" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="50%" stop-color="#eab308"/>
            <stop offset="100%" stop-color="#84cc16"/>
        </linearGradient>
        <linearGradient id="wB" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="180" height="180" rx="40" fill="url(#bg)"/>
    <rect width="180" height="180" rx="40" fill="white" fill-opacity="0.06"/>
    <!-- Left wing -->
    <path d="M82 84 C62 68,40 56,20 59 C30 64,48 73,62 84" fill="url(#wT)" opacity="0.95"/>
    <path d="M79 93 C56 87,34 87,20 101 C31 98,52 93,65 101" fill="url(#wB)" opacity="0.85"/>
    <!-- Right wing -->
    <path d="M98 84 C118 68,140 56,160 59 C150 64,132 73,118 84" fill="url(#wT)" opacity="0.95"/>
    <path d="M101 93 C124 87,146 87,160 101 C149 98,128 93,115 101" fill="url(#wB)" opacity="0.85"/>
    <!-- Tail — 3 feathers -->
    <line x1="82" y1="124" x2="59" y2="160" stroke="#0e7490" stroke-width="5" stroke-linecap="round"/>
    <line x1="90" y1="127" x2="90" y2="163" stroke="#0891b2" stroke-width="6" stroke-linecap="round"/>
    <line x1="98" y1="124" x2="121" y2="160" stroke="#0e7490" stroke-width="5" stroke-linecap="round"/>
    <!-- Tail eye motif — left feather -->
    <circle cx="59" cy="160" r="9" fill="#065f46"/>
    <circle cx="59" cy="160" r="5.5" fill="#06b6d4"/>
    <circle cx="59" cy="160" r="2.4" fill="#083344"/>
    <circle cx="57.5" cy="158.5" r="1" fill="white"/>
    <!-- Tail eye motif — centre feather (largest) -->
    <circle cx="90" cy="163" r="11" fill="#064e3b"/>
    <circle cx="90" cy="163" r="7" fill="#22d3ee"/>
    <circle cx="90" cy="163" r="3" fill="#083344"/>
    <circle cx="88" cy="161" r="1.2" fill="white"/>
    <!-- Tail eye motif — right feather -->
    <circle cx="121" cy="160" r="9" fill="#065f46"/>
    <circle cx="121" cy="160" r="5.5" fill="#06b6d4"/>
    <circle cx="121" cy="160" r="2.4" fill="#083344"/>
    <circle cx="119.5" cy="158.5" r="1" fill="white"/>
    <!-- Body -->
    <ellipse cx="90" cy="104" rx="14" ry="20" fill="white" fill-opacity="0.92"/>
    <!-- Head -->
    <circle cx="90" cy="68" r="17" fill="white" fill-opacity="0.92"/>
    <!-- Crown feathers -->
    <path d="M84 53 C81 43,79 34,81 26" stroke="#f97316" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M90 51 C90 40,90 31,92 23" stroke="#06b6d4" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M96 53 C101 43,106 34,110 28" stroke="#a855f7" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="81" cy="26" r="4" fill="#f97316"/>
    <circle cx="92" cy="23" r="4" fill="#06b6d4"/>
    <circle cx="110" cy="28" r="4" fill="#a855f7"/>
    <!-- Beak -->
    <path d="M97 65 L111 57 L97 73 Z" fill="#f97316"/>
    <!-- Eye -->
    <circle cx="97" cy="65" r="6.5" fill="#0ea5e9"/>
    <circle cx="97" cy="65" r="3" fill="#083344"/>
    <circle cx="95.2" cy="63.2" r="1.2" fill="white"/>
</svg>